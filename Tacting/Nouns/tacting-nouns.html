<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tacting Nouns</title>

<style>

:root{
  --bg:#fef9c3;
  --panel:#ffffff;
  --panel2:#e0f2fe;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#f59e0b;
  --good:#22c55e;
  --bad:#ef4444;
  --border:#93c5fd;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--panel);
  border-radius:16px;
  padding:20px;
  border:2px solid var(--border);
  margin-top:20px;
}

.hidden{display:none}

h1,h2{margin-top:0}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

label{
  display:block;
  margin-bottom:6px;
  color:var(--muted);
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel2);
}

button{
  padding:12px 16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  font-size:16px;
}

.btn-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:16px;
}

.btn-primary{background:var(--accent)}
.btn-good{background:var(--good)}
.btn-bad{background:var(--bad)}
.btn-gray{background:#60a5fa}
.btn-outline{
  background:white;
  border:2px solid var(--border);
  color:var(--text);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.sd{
  font-size:32px;
  font-weight:bold;
}

.progress{
  color:var(--muted);
  font-size:14px;
}

.image-box{
  background:white;
  border-radius:16px;
  padding:20px;
  margin:20px 0;
  min-height:420px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.image-box img{
  max-width:100%;
  max-height:500px;
}

.answers{
  background:var(--panel2);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.summary{
  background:var(--panel2);
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.mono{
  font-family:monospace;
}

@media (max-width:700px){
  .grid{grid-template-columns:1fr}
}

</style>
</head>


<body>

<div class="wrap">

<!-- START SCREEN -->

<div id="startScreen" class="card">

<h1>🎯 Tacting Nouns</h1>

<p><strong>SD:</strong> What is it?</p>

<div class="grid">

<div>
<label>Client Name</label>
<input id="clientName">
</div>

<div>
<label>Select Set</label>
<select id="setSelect">
<option value="all">All</option>
<option value="set_1">Set 1</option>
<option value="set_2">Set 2</option>
<option value="set_3">Set 3</option>
</select>
</div>

<div>
<label>Presentation Order</label>
<select id="orderSelect">
<option value="random">Random</option>
<option value="ordered">In Order</option>
</select>
</div>

</div>

<div class="btn-row">
<button id="startBtn" class="btn-primary">Start Game</button>
</div>

<div id="startMessage"></div>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="card hidden">

<div class="top">

<div>
<div class="sd">What is it?</div>
<div id="progress" class="progress"></div>
</div>

<div class="btn-row">
<button id="backBtn" class="btn-gray">Back</button>
<button id="answersBtn" class="btn-outline">Show Acceptable Responses</button>
<button id="endBtn" class="btn-outline">End</button>
</div>

</div>

<div id="answersBox" class="answers hidden">
<strong>Acceptable responses:</strong>
<div id="answersText"></div>
</div>

<div class="image-box">
<img id="image">
</div>

<div class="btn-row">
<button id="correctBtn" class="btn-good">Correct (Independent)</button>
<button id="incorrectBtn" class="btn-bad">Incorrect</button>
</div>

</div>


<!-- SUMMARY -->

<div id="summaryScreen" class="card hidden">

<h2>Session Summary</h2>

<div id="summaryStats" class="summary"></div>

<div class="summary">
<strong>Targets Missed</strong>
<div id="missedTargets" class="mono"></div>
</div>

<div class="btn-row">
<button id="downloadBtn" class="btn-primary">Download CSV</button>
<button id="restartBtn" class="btn-gray">Back to Start</button>
</div>

</div>

</div>


<script>

let targets=[]
let trials=[]
let responses=[]
let index=0

async function loadTargets(){
const res=await fetch("noun_targets.json")
targets=await res.json()
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}
return a
}

function buildTrials(){

const set=document.getElementById("setSelect").value
const order=document.getElementById("orderSelect").value

let selected=targets

if(set!=="all")
selected=targets.filter(t=>t.set===set)

let built=[]

selected.forEach(t=>{
t.assets.forEach((asset,i)=>{
built.push({
id:t.id,
label:t.label,
asset:asset,
answers:t.acceptable_responses,
exemplar:i+1
})
})
})

if(order==="random")
built=shuffle(built)

return built
}

function renderTrial(){

const trial=trials[index]

if(!trial){
endSession()
return
}

document.getElementById("progress").innerText=
`Trial ${index+1} of ${trials.length} | ${trial.label}`

document.getElementById("image").src=trial.asset

document.getElementById("answersText").innerText=
trial.answers.join(", ")

document.getElementById("answersBox").classList.add("hidden")

}

function score(result){

const t=trials[index]

responses.push({
client:document.getElementById("clientName").value,
target:t.label,
asset:t.asset,
result:result,
time:new Date().toISOString()
})

index++

renderTrial()

}

function endSession(){

document.getElementById("gameScreen").classList.add("hidden")
document.getElementById("summaryScreen").classList.remove("hidden")

const total=responses.length
const correct=responses.filter(r=>r.result==="correct").length
const incorrect=responses.filter(r=>r.result==="incorrect").length

const accuracy=((correct/total)*100).toFixed(1)

document.getElementById("summaryStats").innerHTML=
`Total: ${total}<br>
Correct: ${correct}<br>
Incorrect: ${incorrect}<br>
Accuracy: ${accuracy}%`

const missed=responses
.filter(r=>r.result==="incorrect")
.map(r=>r.target)

document.getElementById("missedTargets").innerText=missed.join(", ")

}

function downloadCSV(){

let csv="client,target,asset,result,time\n"

responses.forEach(r=>{
csv+=`${r.client},${r.target},${r.asset},${r.result},${r.time}\n`
})

const blob=new Blob([csv])
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="tacting_nouns_data.csv"
a.click()

}

document.getElementById("startBtn").onclick=()=>{
trials=buildTrials()
index=0
responses=[]
document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameScreen").classList.remove("hidden")
renderTrial()
}

document.getElementById("correctBtn").onclick=()=>score("correct")
document.getElementById("incorrectBtn").onclick=()=>score("incorrect")

document.getElementById("answersBtn").onclick=()=>{
document.getElementById("answersBox").classList.toggle("hidden")
}

document.getElementById("backBtn").onclick=()=>{
if(index>0) index--
renderTrial()
}

document.getElementById("endBtn").onclick=endSession

document.getElementById("downloadBtn").onclick=downloadCSV

document.getElementById("restartBtn").onclick=()=>{
location.reload()
}

loadTargets()

</script>

</body>
</html>
