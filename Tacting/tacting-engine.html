<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tacting Games</title>
  <style>
    :root{
      --yellow:#f2cf4c;
      --panel:#ececec;
      --teal:#18b9d8;
      --pink:#f2a7d8;
      --lav:#d9bff0;
      --text:#111827;
      --muted:#374151;
      --green:#7ed957;
      --red:#ef4444;
      --white:#ffffff;
      --shadow:0 10px 28px rgba(0,0,0,.16);
      --homeGlow: 0 0 10px rgba(24,185,216,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:var(--yellow);
      color:var(--text);
    }

    .page{
      max-width:1500px;
      margin:0 auto;
      padding:34px 30px 40px;
    }

    .screen{
      background:var(--panel);
      border-radius:18px;
      min-height:820px;
      padding:28px 34px 34px;
      box-shadow:var(--shadow);
      position:relative;
    }

    .hidden{display:none}

    .home-btn{
      position:absolute;
      top:24px;
      left:24px;
      width:56px;
      height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:40px;
      line-height:1;
      color:var(--teal);
      text-shadow: 0 0 6px rgba(255,255,255,.8);
      filter: drop-shadow(0 0 5px rgba(24,185,216,.4));
    }

    .big-title{
      margin:0;
      text-align:center;
      font-size:clamp(54px, 6vw, 106px);
      line-height:1;
      letter-spacing:1px;
      color:var(--teal);
      text-transform:uppercase;
      font-weight:900;
      text-shadow: 6px 6px 0 var(--pink);
    }

    .setup-shell{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:26px;
      align-items:start;
      margin-top:28px;
    }

    .flower-col{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:38px;
      padding-top:14px;
      color:#eca5d5;
      font-size:120px;
      line-height:1;
      user-select:none;
    }

    .setup-form{
      display:flex;
      flex-direction:column;
      gap:28px;
      padding-top:8px;
    }

    .bubble{
      background:var(--lav);
      border-radius:40px;
      min-height:110px;
      display:flex;
      align-items:center;
      padding:0 34px;
      font-size:clamp(28px, 3vw, 64px);
      color:#111;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.25);
    }

    .bubble input,
    .bubble select{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      font:inherit;
      color:#111;
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
    }

    .bubble select{
      cursor:pointer;
      padding-right:42px;
    }

    .select-wrap{
      position:relative;
      width:100%;
    }

    .select-wrap::after{
      content:"⌄";
      position:absolute;
      right:4px;
      top:50%;
      transform:translateY(-52%);
      font-size:64px;
      line-height:1;
      pointer-events:none;
      color:#111;
    }

    .start-row{
      display:flex;
      justify-content:flex-end;
      margin-top:8px;
    }

    .start-btn{
      border:none;
      border-radius:24px;
      padding:18px 34px;
      font-size:32px;
      font-weight:800;
      background:linear-gradient(90deg, var(--teal), var(--pink));
      color:#fff;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .msg{
      margin-top:14px;
      text-align:center;
      color:#334155;
      font-size:18px;
      min-height:24px;
    }

    /* Trial screen */
    .trial-top{
      display:grid;
      grid-template-columns:80px 1fr auto;
      gap:18px;
      align-items:start;
    }

    .trial-home{
      width:58px;
      height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:42px;
      color:var(--teal);
      filter: drop-shadow(0 0 6px rgba(24,185,216,.35));
    }

    .sd-text{
      font-family: Georgia, "Times New Roman", serif;
      font-size:clamp(38px, 4vw, 92px);
      line-height:1;
      color:var(--teal);
      letter-spacing:1px;
      text-transform:uppercase;
      align-self:center;
    }

    .answers-btn{
      align-self:start;
      border:none;
      border-radius:999px;
      padding:18px 28px;
      font-size:26px;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(90deg, var(--teal), var(--pink));
      box-shadow:var(--shadow);
      white-space:nowrap;
    }

    .answers-box{
      margin-top:16px;
      background:#fff;
      border-radius:18px;
      padding:16px 18px;
      border:2px solid #e8d3f4;
      font-size:22px;
      line-height:1.35;
    }

    .stimulus-shell{
      margin-top:18px;
      border:8px dotted #e8d3f4;
      border-radius:20px;
      min-height:500px;
      display:grid;
      grid-template-columns:100px 1fr 100px;
      gap:12px;
      align-items:center;
      padding:22px;
      background:transparent;
    }

    .nav-btn{
      width:82px;
      height:82px;
      border-radius:50%;
      border:8px solid var(--teal);
      background:#f3b5da;
      color:var(--teal);
      font-size:48px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto;
      box-shadow:var(--shadow);
    }

    .stimulus-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:420px;
      padding:10px;
    }

    .stimulus-wrap img{
      max-width:100%;
      max-height:420px;
      object-fit:contain;
      display:block;
    }

    .bottom-row{
      margin-top:18px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:20px;
      align-items:end;
    }

    .progress-group{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-width:520px;
    }

    .progress-bar{
      height:38px;
      border-radius:999px;
      background:#fff;
      border:4px solid #f0a8d6;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:
        repeating-linear-gradient(
          90deg,
          var(--teal) 0 28px,
          #ffffff 28px 32px
        );
      transition:width .15s ease;
    }

    .trial-label{
      font-size:28px;
      color:#111;
    }

    .score-row{
      display:flex;
      align-items:center;
      gap:22px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .icon-btn{
      width:110px;
      height:110px;
      border:none;
      border-radius:50%;
      font-size:56px;
      color:#fff;
      cursor:pointer;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .correct-btn{ background:var(--green); }
    .incorrect-btn{ background:var(--red); }

    .skip-btn{
      border:none;
      border-radius:24px;
      padding:18px 28px;
      font-size:26px;
      font-weight:700;
      background:#94a3b8;
      color:#fff;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .summary-title{
      margin:0;
      text-align:center;
      font-size:clamp(44px, 5vw, 88px);
      line-height:1;
      color:var(--teal);
      text-transform:uppercase;
      font-weight:900;
      text-shadow: 6px 6px 0 var(--pink);
    }

    .summary-box{
      background:#fff;
      border-radius:20px;
      padding:22px 24px;
      margin-top:24px;
      font-size:28px;
      line-height:1.45;
      border:2px solid #e9d5ff;
    }

    .summary-actions{
      margin-top:24px;
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      justify-content:center;
    }

    .summary-btn{
      border:none;
      border-radius:24px;
      padding:18px 28px;
      font-size:24px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .menu-btn{
      background:linear-gradient(90deg, var(--teal), var(--pink));
    }

    .download-btn{
      background:#7c3aed;
    }

    .restart-btn{
      background:#60a5fa;
    }

    @media (max-width: 1100px){
      .setup-shell{
        grid-template-columns:1fr;
      }
      .flower-col{
        flex-direction:row;
        justify-content:center;
        font-size:74px;
        gap:24px;
        padding-top:0;
      }
      .trial-top{
        grid-template-columns:60px 1fr;
      }
      .trial-top .answers-btn{
        grid-column:1 / -1;
        justify-self:end;
      }
      .stimulus-shell{
        grid-template-columns:70px 1fr 70px;
        min-height:420px;
      }
      .bottom-row{
        grid-template-columns:1fr;
      }
      .score-row{
        justify-content:center;
      }
    }

    @media (max-width: 700px){
      .page{
        padding:18px 14px 24px;
      }
      .screen{
        padding:18px 16px 22px;
        min-height:auto;
      }
      .bubble{
        min-height:82px;
        padding:0 20px;
        font-size:34px;
      }
      .select-wrap::after{
        font-size:44px;
      }
      .stimulus-shell{
        grid-template-columns:1fr;
        gap:16px;
      }
      .nav-btn{
        width:70px;
        height:70px;
        font-size:38px;
      }
      .stimulus-wrap img{
        max-height:280px;
      }
      .trial-label{
        font-size:22px;
      }
      .icon-btn{
        width:86px;
        height:86px;
        font-size:42px;
      }
      .skip-btn, .answers-btn, .start-btn, .summary-btn{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

    <!-- START SCREEN -->
    <section id="startScreen" class="screen">
      <button class="home-btn" id="menuBtnStart" title="Main Menu">⌂</button>
