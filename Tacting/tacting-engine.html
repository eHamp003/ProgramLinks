<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tacting Games</title>

<style>
:root{
  --bg1:#7dd3fc;
  --bg2:#a7f3d0;
  --panel:#ffffffee;
  --panel2:#f8fafc;
  --text:#0f172a;
  --muted:#475569;
  --accent:#7c3aed;
  --accent2:#f97316;
  --good:#16a34a;
  --bad:#ef4444;
  --border:#cbd5e1;
  --shadow:0 18px 40px rgba(2,6,23,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.35), transparent 30%),
    linear-gradient(135deg, var(--bg1), var(--bg2));
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:24px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand-badge{
  width:52px;
  height:52px;
  border-radius:18px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow:var(--shadow);
}

.brand h1{
  margin:0;
  font-size:28px;
  line-height:1.05;
}

.brand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:14px;
}

.card{
  background:var(--panel);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,.55);
  border-radius:24px;
  padding:22px;
  box-shadow:var(--shadow);
}

.hidden{display:none}

h2{
  margin:0 0 14px;
  font-size:24px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

label{
  display:block;
  font-size:14px;
  color:var(--muted);
  margin:0 0 6px;
}

input, select{
  width:100%;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  font:inherit;
  outline:none;
}

input:focus, select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(124,58,237,.12);
}

.btn-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:16px;
}

button{
  border:none;
  border-radius:16px;
  padding:12px 16px;
  cursor:pointer;
  color:#fff;
  font:inherit;
  font-weight:700;
  box-shadow:var(--shadow);
  transition:transform .08s ease, opacity .12s ease;
}

button:hover{opacity:.96}
button:active{transform:translateY(1px)}

.btn-primary{background:linear-gradient(135deg, var(--accent), #9f67ff)}
.btn-good{background:linear-gradient(135deg, #22c55e, var(--good))}
.btn-bad{background:linear-gradient(135deg, #fb7185, var(--bad))}
.btn-gray{background:linear-gradient(135deg, #60a5fa, #3b82f6)}
.btn-outline{
  background:#fff;
  color:var(--text);
  border:2px solid #dbeafe;
  box-shadow:none;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}

.sd{
  font-size:32px;
  font-weight:900;
  line-height:1.1;
  letter-spacing:.2px;
}

.progress{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
}

.image-box{
  background:#fff;
  border-radius:24px;
  padding:20px;
  margin:20px 0;
  min-height:460px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:3px dashed #dbeafe;
}

.image-box img{
  max-width:100%;
  max-height:560px;
  object-fit:contain;
  display:block;
}

.answers{
  background:#f8fafc;
  border:1px solid #dbeafe;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
}

.summary{
  background:#f8fafc;
  border:1px solid #dbeafe;
  padding:14px;
  border-radius:16px;
  margin-top:10px;
}

.mono{
  font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  word-break:break-word;
}

.small{
  color:var(--muted);
  font-size:14px;
  margin-top:12px;
}

.pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#fff7ed;
  color:#9a3412;
  font-size:13px;
  font-weight:700;
  border:1px solid #fed7aa;
}

@media (max-width:700px){
  .grid{grid-template-columns:1fr}
  .sd{font-size:24px}
  .image-box{min-height:320px}
  .wrap{padding:16px}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-badge"></div>
      <div>
        <h1>Tacting Games</h1>
        <p>Pick a set, run trials, and download data.</p>
      </div>
    </div>
    <div class="pill" id="gamePill">Loading...</div>
  </div>

  <div id="startScreen" class="card">
    <h2 id="gameTitle">Tacting Games</h2>
    <p><strong>SD:</strong> <span id="sdLabel"></span></p>

    <div class="grid">
      <div>
        <label>Client Name</label>
        <input id="clientName">
      </div>

      <div>
        <label>Select Set</label>
        <select id="setSelect">
          <option value="all">All</option>
        </select>
      </div>

      <div>
        <label>Presentation Order</label>
        <select id="orderSelect">
          <option value="random">Random</option>
          <option value="ordered">In Order</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button id="startBtn" class="btn-primary">Start Game</button>
    </div>

    <div id="startMessage" class="small"></div>
  </div>

  <div id="gameScreen" class="card hidden">
    <div class="top">
      <div>
        <div id="sdText" class="sd"></div>
        <div id="progress" class="progress"></div>
      </div>

      <div class="btn-row" style="margin-top:0;">
        <button id="backBtn" class="btn-gray">Back</button>
        <button id="answersBtn" class="btn-outline">Show Acceptable Responses</button>
        <button id="endBtn" class="btn-outline">End</button>
      </div>
    </div>

    <div id="answersBox" class="answers hidden">
      <strong>Acceptable responses:</strong>
      <div id="answersText" style="margin-top:8px;"></div>
    </div>

    <div class="image-box">
      <img id="image" alt="target">
    </div>

    <div class="btn-row">
      <button id="correctBtn" class="btn-good">Correct (Independent)</button>
      <button id="incorrectBtn" class="btn-bad">Incorrect</button>
    </div>

    <div id="gameMessage" class="small"></div>
  </div>

  <div id="summaryScreen" class="card hidden">
    <h2>Session Summary</h2>

    <div id="summaryStats" class="summary"></div>

    <div class="summary">
      <strong>Targets Missed</strong>
      <div id="missedTargets" class="mono" style="margin-top:8px;"></div>
    </div>

    <div class="btn-row">
      <button id="downloadBtn" class="btn-primary">Download CSV</button>
      <button id="restartBtn" class="btn-gray">Back to Start</button>
    </div>
  </div>

</div>

<script>
const GAME_CONFIG = {
  nouns: {
    title: "🎯 Tacting Nouns",
    sd: "What is it?",
    json: "noun_targets.json",
    pill: "Nouns"
  },
  actions: {
    title: "🏃 Tacting Actions",
    sd: "What are they doing?",
    json: "action_targets.json",
    pill: "Actions"
  },
  prepositions: {
    title: "📍 Tacting Prepositions",
    sd: "Where is the ball?",
    json: "preposition_targets.json",
    pill: "Prepositions"
  },
  pronouns: {
    title: "🧍 Tacting Pronouns",
    sd: "Who is doing the action?",
    json: "pronoun_targets.json",
    pill: "Pronouns"
  },
  combos: {
    title: "🗣️ Tacting Noun-Verb Combos",
    sd: "Tell me what is happening here",
    json: "combo_targets.json",
    pill: "Combos"
  }
};

let gameType = "";
let config = null;
let targets = [];
let trials = [];
let responses = [];
let index = 0;

function getGameType(){
  const params = new URLSearchParams(window.location.search);
  return params.get("game") || "nouns";
}

function shuffle(a){
  const arr = [...a];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function csvEscape(value){
  const s = String(value ?? "");
  return '"' + s.replace(/"/g, '""') + '"';
}

function showScreen(screenId){
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("summaryScreen").classList.add("hidden");
  document.getElementById(screenId).classList.remove("hidden");
}

function populateSets(){
  const setSelect = document.getElementById("setSelect");
  const uniqueSets = [...new Set(targets.map(t => t.set).filter(Boolean))];
  uniqueSets.forEach(setName => {
    const opt = document.createElement("option");
    opt.value = setName;
    opt.textContent = setName.replace("_", " ").replace(/\b\w/g, c => c.toUpperCase());
    setSelect.appendChild(opt);
  });
}

async function loadTargets(){
  try{
    const res = await fetch(config.json);
    if(!res.ok) throw new Error("Could not load " + config.json);
    targets = await res.json();
    document.getElementById("startMessage").textContent = `Loaded ${targets.length} targets.`;
    populateSets();
  }catch(error){
    document.getElementById("startMessage").textContent = error.message;
    console.error(error);
  }
}

function buildTrials(){
  const set = document.getElementById("setSelect").value;
  const order = document.getElementById("orderSelect").value;

  let selected = targets;
  if(set !== "all"){
    selected = targets.filter(t => t.set === set);
  }

  let built = [];

  selected.forEach(t => {
    const assetList = Array.isArray(t.assets) ? t.assets : [t.asset];
    assetList.forEach((asset, i) => {
      built.push({
        id: t.id,
        label: t.label,
        set: t.set || "",
        asset: asset,
        acceptable_responses: t.acceptable_responses || [t.label],
        exemplar: i + 1,
        custom_sd: t.sd || ""
      });
    });
  });

  if(order === "random"){
    built = shuffle(built);
  }

  return built;
}

function getTrialSD(trial){
  if(gameType === "pronouns"){
    return trial.custom_sd || config.sd;
  }
  return config.sd;
}

function renderTrial(){
  const trial = trials[index];
  if(!trial){
    endSession();
    return;
  }

  document.getElementById("sdText").textContent = getTrialSD(trial);
  document.getElementById("progress").textContent =
    `Trial ${index + 1} of ${trials.length} | ${trial.label}`;

  document.getElementById("image").src = trial.asset;
  document.getElementById("answersText").textContent = trial.acceptable_responses.join(", ");
  document.getElementById("answersBox").classList.add("hidden");
  document.getElementById("gameMessage").textContent = "";

  document.getElementById("image").onerror = () => {
    document.getElementById("gameMessage").textContent = `Missing file: ${trial.asset}`;
  };
}

function recordResponse(result){
  const t = trials[index];
  responses[index] = {
    client: document.getElementById("clientName").value.trim(),
    game_type: gameType,
    sd: getTrialSD(t),
    set_name: document.getElementById("setSelect").value,
    presentation_order: document.getElementById("orderSelect").value,
    target_id: t.id,
    label: t.label,
    asset: t.asset,
    exemplar_number: t.exemplar,
    acceptable_responses: t.acceptable_responses.join(" | "),
    result: result,
    time: new Date().toISOString()
  };

  index++;
  renderTrial();
}

function goBack(){
  if(index > 0){
    index--;
    renderTrial();
  }
}

function endSession(){
  showScreen("summaryScreen");

  const completed = responses.filter(Boolean);
  const total = completed.length;
  const correct = completed.filter(r => r.result === "correct_independent").length;
  const incorrect = completed.filter(r => r.result === "incorrect").length;
  const accuracy = total ? ((correct / total) * 100).toFixed(1) : "0.0";

  document.getElementById("summaryStats").innerHTML = `
    <div><strong>Total scored trials:</strong> ${total}</div>
    <div><strong>Correct (Independent):</strong> ${correct}</div>
    <div><strong>Incorrect:</strong> ${incorrect}</div>
    <div><strong>Accuracy:</strong> ${accuracy}%</div>
  `;

  const missed = completed
    .filter(r => r.result === "incorrect")
    .map(r => `${r.label}${r.exemplar_number ? ` (exemplar ${r.exemplar_number})` : ""}`);

  document.getElementById("missedTargets").textContent = missed.length ? missed.join(", ") : "None";
}

function downloadCSV(){
  const rows = responses.filter(Boolean);
  if(!rows.length) return;

  const headers = [
    "client",
    "game_type",
    "sd",
    "set_name",
    "presentation_order",
    "target_id",
    "label",
    "asset",
    "exemplar_number",
    "acceptable_responses",
    "result",
    "time"
  ];

  let csv = headers.join(",") + "\\n";
  rows.forEach(row => {
    csv += headers.map(h => csvEscape(row[h])).join(",") + "\\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const clientName = document.getElementById("clientName").value.trim() || "client";
  a.download = `${clientName}_${gameType}_data.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function init(){
  gameType = getGameType();
  config = GAME_CONFIG[gameType] || GAME_CONFIG.nouns;

  document.getElementById("gameTitle").textContent = config.title;
  document.getElementById("sdLabel").textContent = config.sd;
  document.getElementById("sdText").textContent = config.sd;
  document.getElementById("gamePill").textContent = config.pill;

  document.getElementById("startBtn").onclick = () => {
    trials = buildTrials();
    responses = [];
    index = 0;

    if(!trials.length){
      document.getElementById("startMessage").textContent = "No trials found for that set.";
      return;
    }

    showScreen("gameScreen");
    renderTrial();
  };

  document.getElementById("correctBtn").onclick = () => recordResponse("correct_independent");
  document.getElementById("incorrectBtn").onclick = () => recordResponse("incorrect");
  document.getElementById("backBtn").onclick = goBack;
  document.getElementById("endBtn").onclick = endSession;
  document.getElementById("answersBtn").onclick = () => {
    document.getElementById("answersBox").classList.toggle("hidden");
  };
  document.getElementById("downloadBtn").onclick = downloadCSV;
  document.getElementById("restartBtn").onclick = () => location.reload();

  loadTargets();
}

init();
</script>
</body>
</html>
