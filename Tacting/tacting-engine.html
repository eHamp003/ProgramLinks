<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tacting Games</title>
  <style>
    :root{
      --bg:#f2cd49;
      --panel:#efefef;
      --panel-border:#d8d8d8;
      --pink:#f2b3dd;
      --pink-dark:#e58bc8;
      --purple:#dcc8ef;
      --teal:#1fb6d9;
      --teal-dark:#1498b8;
      --green:#7cd957;
      --red:#ef4444;
      --text:#111827;
      --muted:#4b5563;
      --white:#ffffff;
      --shadow:0 10px 24px rgba(0,0,0,.14);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;
      color:var(--text);
    }

    .page{
      max-width:1560px;
      margin:0 auto;
      padding:22px;
    }

    .card{
      background:var(--panel);
      border:2px solid var(--panel-border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px 28px 28px;
      min-height: calc(100vh - 44px);
    }

    .hidden{display:none}

    .home-btn{
      width:64px;
      height:64px;
      border-radius:18px;
      border:none;
      cursor:pointer;
      background:transparent;
      font-size:40px;
      line-height:1;
      color:var(--teal);
      text-shadow:0 0 10px rgba(31,182,217,.28);
      padding:0;
      box-shadow:none;
    }

    .home-btn:hover{transform:scale(1.04)}
    .home-btn:active{transform:scale(.98)}

    .screen-title{
      margin:0;
      text-align:center;
      color:var(--teal);
      font-size:clamp(42px,5vw,96px);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      text-shadow:8px 8px 0 var(--pink);
      line-height:1;
    }

    .setup-shell{
      display:grid;
      grid-template-columns:220px 1fr;
      gap:20px;
      align-items:start;
      margin-top:8px;
    }

    .flower-col{
      min-height:540px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-evenly;
      padding-top:22px;
    }

    .flower{
      position:relative;
      width:120px;
      height:120px;
    }

    .flower.small{width:74px;height:74px}
    .flower.large{width:150px;height:150px}

    .flower::before,
    .flower::after{
      content:"";
      position:absolute;
      inset:0;
      margin:auto;
      width:100%;
      height:100%;
      background:
        radial-gradient(circle at 50% 16%, var(--pink) 0 18%, transparent 19%),
        radial-gradient(circle at 84% 50%, var(--pink) 0 18%, transparent 19%),
        radial-gradient(circle at 50% 84%, var(--pink) 0 18%, transparent 19%),
        radial-gradient(circle at 16% 50%, var(--pink) 0 18%, transparent 19%);
      border-radius:50%;
    }

    .flower::after{
      transform:rotate(45deg);
    }

    .flower span{
      position:absolute;
      inset:0;
      margin:auto;
      width:24%;
      height:24%;
      background:var(--panel);
      border-radius:50%;
      z-index:2;
    }

    .setup-main{
      padding-right:24px;
    }

    .bubble{
      width:100%;
      background:var(--purple);
      border:none;
      border-radius:40px;
      padding:26px 34px;
      font-size:clamp(28px,2.4vw,64px);
      color:var(--text);
      margin:22px 0;
      outline:none;
    }

    .bubble::placeholder{color:#222}

    .select-wrap{
      position:relative;
      margin:22px 0;
    }

    .bubble-select{
      appearance:none;
      -webkit-appearance:none;
      width:100%;
      background:var(--purple);
      border:none;
      border-radius:40px;
      padding:26px 90px 26px 34px;
      font-size:clamp(28px,2.3vw,60px);
      color:var(--text);
      outline:none;
      cursor:pointer;
    }

    .select-arrow{
      position:absolute;
      right:32px;
      top:50%;
      width:28px;
      height:28px;
      transform:translateY(-60%) rotate(45deg);
      border-right:6px solid #111;
      border-bottom:6px solid #111;
      pointer-events:none;
    }

    .start-row{
      display:flex;
      justify-content:center;
      margin-top:12px;
    }

    .start-btn{
      border:none;
      cursor:pointer;
      background:linear-gradient(90deg,var(--teal),var(--pink));
      color:#fff;
      border-radius:999px;
      padding:18px 34px;
      font-size:28px;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .small-note{
      margin-top:16px;
      text-align:center;
      font-size:16px;
      color:var(--muted);
      min-height:24px;
    }

    .trial-top{
      display:grid;
      grid-template-columns:72px 1fr auto;
      gap:18px;
      align-items:center;
    }

    .sd-text{
      margin:0;
      color:var(--teal);
      font-size:clamp(34px,4vw,78px);
      line-height:1.05;
      font-weight:500;
      letter-spacing:1px;
      text-transform:uppercase;
      font-family:Georgia, "Times New Roman", serif;
    }

    .responses-btn{
      border:none;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(90deg,var(--teal),var(--pink));
      border-radius:999px;
      padding:18px 28px;
      font-size:clamp(18px,1.6vw,30px);
      box-shadow:var(--shadow);
      white-space:nowrap;
    }

    .answers-box{
      margin:16px auto 8px;
      width:min(1320px,96%);
      background:#fff;
      border:3px dashed #dfc5f0;
      border-radius:20px;
      padding:16px 22px;
      font-size:22px;
      line-height:1.35;
      color:#374151;
    }

    .image-stage{
      margin:18px auto 16px;
      width:min(1320px,96%);
      min-height:560px;
      border:8px dashed #dfc5f0;
      border-radius:14px;
      background:#fff;
      display:grid;
      grid-template-columns:100px 1fr 100px;
      align-items:center;
      gap:18px;
      padding:18px 18px;
    }

    .nav-btn{
      width:86px;
      height:86px;
      border-radius:50%;
      border:8px solid var(--teal);
      background:#f6c5e5;
      color:var(--teal);
      font-size:48px;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      box-shadow:var(--shadow);
    }

    .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .stimulus-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:460px;
      width:100%;
    }

    .stimulus{
      max-width:100%;
      max-height:470px;
      object-fit:contain;
      display:block;
    }

    .bottom-area{
      width:min(1320px,96%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr auto;
      gap:22px;
      align-items:end;
    }

    .left-info{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .progress-shell{
      width:100%;
      max-width:460px;
      height:42px;
      border-radius:999px;
      background:#fff;
      border:4px solid #ec9fd0;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:
        repeating-linear-gradient(
          90deg,
          var(--teal) 0 28px,
          #37c4e4 28px 32px
        );
      border-radius:999px;
      transition:width .18s ease;
    }

    .trial-label{
      font-size:22px;
      color:#111;
    }

    .score-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:26px;
      flex-wrap:wrap;
    }

    .icon-btn{
      width:108px;
      height:108px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      font-size:54px;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
    }

    .good-btn{background:var(--green)}
    .bad-btn{background:var(--red)}
    .skip-btn{
      width:auto;
      min-width:120px;
      border-radius:999px;
      padding:0 28px;
      background:#60a5fa;
      font-size:26px;
      font-weight:800;
    }

    .status-line{
      width:min(1320px,96%);
      margin:14px auto 0;
      min-height:24px;
      text-align:center;
      color:var(--muted);
      font-size:15px;
    }

    .summary-title{
      text-align:center;
      margin:10px 0 24px;
      color:var(--teal);
      font-size:clamp(42px,4.4vw,82px);
      font-weight:900;
      text-transform:uppercase;
      text-shadow:8px 8px 0 var(--pink);
      line-height:1;
    }

    .summary-box{
      width:min(1000px,95%);
      margin:0 auto 18px;
      background:#fff;
      border:3px dashed #dfc5f0;
      border-radius:22px;
      padding:24px 28px;
      font-size:24px;
      line-height:1.6;
    }

    .summary-box strong{color:#111}
    .missed-list{
      font-family:Consolas, monospace;
      font-size:18px;
      line-height:1.5;
      word-break:break-word;
    }

    .summary-buttons{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .pill-btn{
      border:none;
      cursor:pointer;
      color:#fff;
      border-radius:999px;
      padding:18px 28px;
      font-size:24px;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .menu-btn{background:linear-gradient(90deg,var(--teal),var(--pink))}
    .download-btn{background:linear-gradient(90deg,#8b5cf6,#ec4899)}
    .restart-btn{background:linear-gradient(90deg,#60a5fa,#3b82f6)}

    @media (max-width:1100px){
      .setup-shell{
        grid-template-columns:1fr;
      }
      .flower-col{
        min-height:auto;
        flex-direction:row;
        justify-content:center;
        gap:20px;
        padding-top:0;
      }
      .setup-main{padding-right:0}
      .trial-top{
        grid-template-columns:64px 1fr;
      }
      .responses-btn{
        grid-column:1 / -1;
        justify-self:end;
      }
      .image-stage{
        grid-template-columns:72px 1fr 72px;
        min-height:460px;
      }
      .nav-btn{
        width:64px;
        height:64px;
        font-size:34px;
        border-width:6px;
      }
      .bottom-area{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .left-info{
        align-items:center;
      }
      .trial-label{text-align:center}
    }

    @media (max-width:700px){
      .page{padding:10px}
      .card{padding:16px}
      .home-btn{
        width:52px;
        height:52px;
        font-size:30px;
      }
      .image-stage{
        grid-template-columns:58px 1fr 58px;
        padding:12px;
        min-height:340px;
      }
      .stimulus{max-height:280px}
      .icon-btn{
        width:84px;
        height:84px;
        font-size:42px;
      }
      .skip-btn{
        min-width:100px;
        font-size:22px;
      }
      .progress-shell{
        height:34px;
      }
      .trial-label{
        font-size:18px;
      }
      .answers-box{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- START SCREEN -->
    <section id="startScreen" class="card">
      <button class="home-btn" id="menuBtnStart" title="Main Menu">⌂</button>

      <h1 id="gameTitleStart" class="screen-title">TACTING GAMES</h1>

      <div class="setup-shell">
        <div class="flower-col" aria-hidden="true">
          <div class="flower large"><span></span></div>
          <div class="flower small"><span></span></div>
          <div class="flower large"><span></span></div>
        </div>

        <div class="setup-main">
          <input id="clientName" class="bubble" placeholder="Client Code:">

          <div class="select-wrap">
            <select id="setSelect" class="bubble-select">
              <option value="all">Select Set:</option>
            </select>
            <div class="select-arrow"></div>
          </div>

          <div class="select-wrap">
            <select id="orderSelect" class="bubble-select">
              <option value="random">Presentation Order: Random</option>
              <option value="ordered">Presentation Order: In Order</option>
            </select>
            <div class="select-arrow"></div>
          </div>

          <div class="start-row">
            <button id="startBtn" class="start-btn">Start Session</button>
          </div>

          <div id="startMessage" class="small-note"></div>
        </div>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="gameScreen" class="card hidden">
      <div class="trial-top">
        <button class="home-btn" id="menuBtnGame" title="Main Menu">⌂</button>
        <h2 id="sdText" class="sd-text">SD: WHAT IS IT?</h2>
        <button id="answersBtn" class="responses-btn">Acceptable Responses</button>
      </div>

      <div id="answersBox" class="answers-box hidden">
        <strong>Acceptable responses:</strong>
        <div id="answersText" style="margin-top:8px;"></div>
      </div>

      <div class="image-stage">
        <button id="backBtn" class="nav-btn" title="Back">←</button>

        <div class="stimulus-wrap">
          <img id="image" class="stimulus" alt="target stimulus">
        </div>

        <button id="nextBtn" class="nav-btn" title="Next">→</button>
      </div>

      <div class="bottom-area">
        <div class="left-info">
          <div class="progress-shell">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="progress" class="trial-label">Trial 1 of 10 | target</div>
        </div>

        <div class="score-row">
          <button id="correctBtn" class="icon-btn good-btn" title="Correct">👍</button>
          <button id="incorrectBtn" class="icon-btn bad-btn" title="Incorrect">👎</button>
          <button id="skipBtn" class="icon-btn skip-btn" title="Skip">Skip</button>
        </div>
      </div>

      <div id="gameMessage" class="status-line"></div>
    </section>

    <!-- SUMMARY SCREEN -->
    <section id="summaryScreen" class="card hidden">
      <button class="home-btn" id="menuBtnSummary" title="Main Menu">⌂</button>

      <h1 class="summary-title">Session Summary</h1>

      <div id="summaryStats" class="summary-box"></div>

      <div class="summary-box">
        <strong>Targets Missed</strong>
        <div id="missedTargets" class="missed-list" style="margin-top:10px;"></div>
      </div>

      <div class="summary-buttons">
        <button id="downloadBtn" class="pill-btn download-btn">Download CSV</button>
        <button id="restartBtn" class="pill-btn restart-btn">Back to Start</button>
      </div>
    </section>

  </div>

  <script>
    const GAME_CONFIG = {
      nouns: {
        title: "TACTING NOUNS",
        sd: "SD: WHAT IS IT?",
        json: "noun_targets.json"
      },
      actions: {
        title: "TACTING ACTIONS",
        sd: "SD: WHAT ARE THEY DOING?",
        json: "action_targets.json"
      },
      prepositions: {
        title: "TACTING PREPOSITIONS",
        sd: "SD: WHERE IS THE BALL?",
        json: "preposition_targets.json"
      },
      pronouns: {
        title: "TACTING PRONOUNS",
        sd: "SD: WHO IS DOING THE ACTION?",
        json: "pronoun_targets.json"
      },
      combos: {
        title: "TACTING NOUN-VERB COMBOS",
        sd: "SD: TELL ME WHAT IS HAPPENING HERE",
        json: "combo_targets.json"
      }
    };

    let gameType = "";
    let config = null;
    let targets = [];
    let trials = [];
    let responses = [];
    let index = 0;

    function byId(id){
      return document.getElementById(id);
    }

    function getGameType(){
      const params = new URLSearchParams(window.location.search);
      return params.get("game") || "nouns";
    }

    function showScreen(screenId){
      byId("startScreen").classList.add("hidden");
      byId("gameScreen").classList.add("hidden");
      byId("summaryScreen").classList.add("hidden");
      byId(screenId).classList.remove("hidden");
    }

    function shuffle(array){
      const arr = [...array];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function csvEscape(value){
      const s = String(value ?? "");
      return '"' + s.replace(/"/g, '""') + '"';
    }

    function goToMainMenu(){
      window.location.href = "index.html";
    }

    function populateSets(){
      const setSelect = byId("setSelect");
      setSelect.innerHTML = '<option value="all">Select Set: All</option>';
      const uniqueSets = [...new Set(targets.map(t => t.set).filter(Boolean))];
      uniqueSets.forEach(setName => {
        const opt = document.createElement("option");
        opt.value = setName;
        opt.textContent = "Select Set: " + setName.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
        setSelect.appendChild(opt);
      });
    }

    async function loadTargets(){
      try{
        byId("startMessage").textContent = `Trying to load ${config.json}...`;
        const res = await fetch(config.json);

        if(!res.ok){
          throw new Error(`Could not load ${config.json} (status ${res.status})`);
        }

        targets = await res.json();

        if(!Array.isArray(targets)){
          throw new Error(`${config.json} did not load as an array.`);
        }

        byId("startMessage").textContent = `Loaded ${targets.length} targets from ${config.json}.`;
        populateSets();
      }catch(error){
        byId("startMessage").textContent = error.message;
        console.error(error);
      }
    }

    function buildTrials(){
      const selectedSet = byId("setSelect").value;
      const selectedOrder = byId("orderSelect").value;

      let selectedTargets = targets;
      if(selectedSet !== "all"){
        selectedTargets = targets.filter(t => t.set === selectedSet);
      }

      let built = [];

      selectedTargets.forEach(target => {
        const assetList = Array.isArray(target.assets) ? target.assets : [target.asset];
        assetList.forEach((asset, i) => {
          built.push({
            id: target.id,
            label: target.label,
            set: target.set || "",
            asset: asset,
            acceptable_responses: target.acceptable_responses || [target.label],
            exemplar: i + 1,
            custom_sd: target.sd || ""
          });
        });
      });

      if(selectedOrder === "random"){
        built = shuffle(built);
      }

      return built;
    }

    function getTrialSD(trial){
      if(gameType === "pronouns" && trial.custom_sd){
        return "SD: " + trial.custom_sd.toUpperCase();
      }
      return config.sd;
    }

    function updateProgress(){
      const total = trials.length || 1;
      const completed = index;
      const percent = Math.max(0, Math.min(100, (completed / total) * 100));
      byId("progressFill").style.width = percent + "%";
    }

    function renderTrial(){
      const trial = trials[index];

      if(!trial){
        endSession();
        return;
      }

      byId("sdText").textContent = getTrialSD(trial);
      byId("progress").textContent = `Trial ${index + 1} of ${trials.length} | ${trial.label}`;
      byId("image").src = trial.asset;
      byId("answersText").textContent = trial.acceptable_responses.join(", ");
      byId("answersBox").classList.add("hidden");
      byId("gameMessage").textContent = "";

      byId("backBtn").disabled = index === 0;
      byId("nextBtn").disabled = index >= trials.length - 1;

      updateProgress();

      byId("image").onerror = () => {
        byId("gameMessage").textContent = `Missing file: ${trial.asset}`;
      };
    }

    function recordResponse(result){
      const t = trials[index];

      responses[index] = {
        client: byId("clientName").value.trim(),
        game_type: gameType,
        sd: getTrialSD(t),
        set_name: byId("setSelect").value,
        presentation_order: byId("orderSelect").value,
        target_id: t.id,
        label: t.label,
        asset: t.asset,
        exemplar_number: t.exemplar,
        acceptable_responses: t.acceptable_responses.join(" | "),
        result: result,
        time: new Date().toISOString()
      };

      index++;
      renderTrial();
    }

    function skipTrial(){
      recordResponse("skipped");
    }

    function goBackTrial(){
      if(index > 0){
        index--;
        renderTrial();
      }
    }

    function goNextTrial(){
      if(index < trials.length - 1){
        index++;
        renderTrial();
      }
    }

    function endSession(){
      showScreen("summaryScreen");

      const completed = responses.filter(Boolean);
      const total = completed.length;
      const correct = completed.filter(r => r.result === "correct_independent").length;
      const incorrect = completed.filter(r => r.result === "incorrect").length;
      const skipped = completed.filter(r => r.result === "skipped").length;
      const accuracy = total ? ((correct / total) * 100).toFixed(1) : "0.0";

      byId("summaryStats").innerHTML = `
        <div><strong>Total scored trials:</strong> ${total}</div>
        <div><strong>Correct (Independent):</strong> ${correct}</div>
        <div><strong>Incorrect:</strong> ${incorrect}</div>
        <div><strong>Skipped:</strong> ${skipped}</div>
        <div><strong>Accuracy:</strong> ${accuracy}%</div>
      `;

      const missed = completed
        .filter(r => r.result === "incorrect")
        .map(r => `${r.label}${r.exemplar_number ? ` (exemplar ${r.exemplar_number})` : ""}`);

      byId("missedTargets").textContent = missed.length ? missed.join(", ") : "None";
    }

    function downloadCSV(){
      const rows = responses.filter(Boolean);
      if(!rows.length) return;

      const headers = [
        "client",
        "game_type",
        "sd",
        "set_name",
        "presentation_order",
        "target_id",
        "label",
        "asset",
        "exemplar_number",
        "acceptable_responses",
        "result",
        "time"
      ];

      let csv = headers.join(",") + "\n";
      rows.forEach(row => {
        csv += headers.map(h => csvEscape(row[h])).join(",") + "\n";
      });

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const clientName = byId("clientName").value.trim() || "client";
      a.download = `${clientName}_${gameType}_data.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function init(){
      gameType = getGameType();
      config = GAME_CONFIG[gameType] || GAME_CONFIG.nouns;

      byId("gameTitleStart").textContent = config.title;

      byId("startBtn").onclick = () => {
        trials = buildTrials();
        responses = [];
        index = 0;

        if(!trials.length){
          byId("startMessage").textContent = "No trials found for that set.";
          return;
        }

        showScreen("gameScreen");
        renderTrial();
      };

      byId("menuBtnStart").onclick = goToMainMenu;
      byId("menuBtnGame").onclick = goToMainMenu;
      byId("menuBtnSummary").onclick = goToMainMenu;

      byId("answersBtn").onclick = () => {
        byId("answersBox").classList.toggle("hidden");
      };

      byId("correctBtn").onclick = () => recordResponse("correct_independent");
      byId("incorrectBtn").onclick = () => recordResponse("incorrect");
      byId("skipBtn").onclick = skipTrial;
      byId("backBtn").onclick = goBackTrial;
      byId("nextBtn").onclick = goNextTrial;

      byId("downloadBtn").onclick = downloadCSV;
      byId("restartBtn").onclick = () => {
        showScreen("startScreen");
        byId("answersBox").classList.add("hidden");
        byId("gameMessage").textContent = "";
        byId("progressFill").style.width = "0%";
      };

      loadTargets();
    }

    init();
  </script>
</body>
</html>
